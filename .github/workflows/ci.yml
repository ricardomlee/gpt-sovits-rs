name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  workflow-lint:
    name: Validate workflows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.9

  quality:
    name: Format, lint, and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoxr-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features http-api -- -D warnings

      - name: Run tests
        run: cargo test --locked --features http-api

  release-binary:
    name: Compile release binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoxr-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-binary

      - name: Build Linux CPU binary
        run: cargo build --release --locked --features http-api,mkl

      - name: Smoke test binary
        run: target/release/gpt-sovits --version

      - name: Package Linux CPU binary
        shell: bash
        run: |
          set -euo pipefail
          package="gpt-sovits-ci-linux-x86_64"
          mkdir -p "dist/${package}/lib"
          cp target/release/gpt-sovits "dist/${package}/"
          soxr="$(ldconfig -p | awk '$1 == "libsoxr.so.0" { print $NF; exit }')"
          cp -L "${soxr}" "dist/${package}/lib/libsoxr.so.0"
          patchelf --set-rpath '$ORIGIN/lib' "dist/${package}/gpt-sovits"
          strip "dist/${package}/gpt-sovits"
          "dist/${package}/gpt-sovits" --version
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Upload Linux CPU binary
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64-binary
          path: dist/*.tar.gz
          if-no-files-found: error

  docker:
    name: Build CPU container
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
