[[example]]
name = "test_conv_pre_weights"
path = "examples/test_conv_pre_weights.rs"

[[example]]
name = "test_decoder_debug"
path = "examples/test_decoder_debug.rs"

[[example]]
name = "test_encq_path"
path = "examples/test_encq_path.rs"

[[example]]
