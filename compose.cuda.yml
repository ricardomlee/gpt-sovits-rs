services:
  gpt-sovits:
    image: "ghcr.io/ricardomlee/gpt-sovits-rs:${CUDA_IMAGE_TAG:-latest-cuda-sm89}"
    pull_policy: always
    container_name: gpt-sovits-rs
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${GPT_SOVITS_PORT:-9880}:9880"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9880/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - "${MODELS_DIR:-./models}:/app/models:ro"
      - "${VOICES_DIR:-./voices}:/app/voices:ro"
      - "${OUTPUTS_DIR:-./outputs}:/app/outputs"
    command:
      - "--http"
      - "--port"
      - "9880"
      - "--device"
      - "cuda"
      - "--models-dir"
      - "/app/models"
      - "--voices-dir"
      - "/app/voices"
      - "--max-cached-pipelines"
      - "${MAX_CACHED_PIPELINES:-2}"
      - "--max-text-chars"
      - "${MAX_TEXT_CHARS:-10000}"
      - "--max-batch-items"
      - "${MAX_BATCH_ITEMS:-64}"
      - "--preload-voices"
      - "${PRELOAD_VOICES:-}"
      - "--gpt-model"
      - "${GPT_MODEL:-/app/models/gpt-model.safetensors}"
      - "--sovits-model"
      - "${SOVITS_MODEL:-/app/models/sovits-model.safetensors}"
      - "--bert-model"
      - "${BERT_MODEL:-/app/models/bert/bert.safetensors}"
      - "--hubert-model"
      - "${HUBERT_MODEL:-/app/models/hubert/hubert.safetensors}"
